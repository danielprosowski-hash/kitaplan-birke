<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kitaplan Birke – Dienstplanung für die Kita, läuft lokal im Browser. Erstellt von Daniel Prosowski." />
    <!-- Die App lädt bewusst nichts von außerhalb sich selbst (kein Server, keine
         Cloud-Dienste, keine Tracker) – diese Content-Security-Policy erzwingt das
         zusätzlich auf Browser-Ebene, als Härtung falls trotzdem einmal fremder
         Code in eine Abhängigkeit gelangen sollte. 'unsafe-inline' bei style-src
         ist nötig, weil React Inline-Styles (style={{...}}) als style-Attribute
         rendert; script-src bleibt strikt auf 'self', kein unsafe-inline/eval. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"
    />
    <title>Kitaplan Birke</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
